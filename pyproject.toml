[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "code-sandbox-mcp"
version = "0.1.0"
description = "MCP server for Docker sandbox execution with pass-through-env support"
requires-python = ">=3.10"
dependencies = [
    "fastmcp>=2.0.0",
    "docker>=7.0.0",
    "httpx>=0.28.0",
    "pyjwt[crypto]>=2.0.0",
    "platformdirs>=3.0.0",
]

[project.scripts]
code-sandbox-mcp = "code_sandbox_mcp.server:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["code_sandbox_mcp*"]

[tool.setuptools.package-data]
# Ship the digest pin data file inside the wheel so importlib.resources can
# read it at runtime (Issue #331).
code_sandbox_mcp = ["image_pins.json"]

[project.optional-dependencies]
test = ["pytest"]
dev = ["pytest", "ruff"]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "D100", "D101", "D102", "D103", "D104"]
ignore = ["E501"]  # line-too-long: CSS/HTML template strings make this impractical

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D100", "D101", "D102", "D103", "D104"]
