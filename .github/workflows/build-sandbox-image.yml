name: Build sandbox image

on:
  push:
    branches: [main]
    paths:
      - "docker/Dockerfile.sandbox"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.sandbox
          push: true
          tags: ghcr.io/${{ github.repository }}/sandbox:latest

      - name: Update _DEFAULT_IMAGE in server.py and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST: ${{ steps.build.outputs.digest }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          NEW_IMAGE="ghcr.io/${REPO}/sandbox@${DIGEST}"
          echo "New image reference: ${NEW_IMAGE}"

          # _DEFAULT_IMAGE の値を置換（行全体を対象にして誤マッチを防ぐ）
          sed -i \
            "s|^_DEFAULT_IMAGE: str = \".*\"|_DEFAULT_IMAGE: str = \"${NEW_IMAGE}\"|" \
            src/code_sandbox_mcp/server.py

          # ダイジェストが変わっていなければ PR 不要
          if git diff --quiet; then
            echo "No change to _DEFAULT_IMAGE (digest unchanged), skipping PR."
            exit 0
          fi

          BRANCH="ci/update-sandbox-image-${RUN_ID}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add src/code_sandbox_mcp/server.py
          git commit -m "chore: update _DEFAULT_IMAGE to sandbox image

          ghcr.io/${REPO}/sandbox@${DIGEST}

          Automated update triggered by docker/Dockerfile.sandbox change.
          Closes #56"
          git push origin "${BRANCH}"

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(#56): _DEFAULT_IMAGE を最新 sandbox イメージに更新" \
            --body "## 自動生成 PR（#56 前半: 既定イメージ是正）

          CI で \`docker/Dockerfile.sandbox\` のビルドが完了したため、
          \`_DEFAULT_IMAGE\` を新しいダイジェストへ更新します。

          ### 変更内容

          \`src/code_sandbox_mcp/server.py\` の \`_DEFAULT_IMAGE\` を
          GHCR 上の最新 sandbox イメージ（git/gh/uv/ripgrep 同梱・\`sandbox\` ユーザー）へ差し替え。

          \`\`\`
          ghcr.io/${REPO}/sandbox@${DIGEST}
          \`\`\`

          ### 効果

          - 既定コンテナに git / gh / uv / ripgrep / ruff / pyright / semgrep が同梱される
          - 既定ユーザーが \`nobody\` → \`sandbox\` に変わる
          - \`allow_network=True\` + \`inject_vcs_token=True\` で VCS 操作（\`gh issue view\` 等）が通るようになる
          - #55（issue_view + submit）の実装前提が整う

          ### ビルド情報

          - Workflow run: ${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}
          - Digest: \`${DIGEST}\`

          ### 受け入れ確認

          - [ ] 既定コンテナで \`git --version\` / \`gh --version\` が通ること
          - [ ] コンテナ内ユーザーが \`sandbox\`（\`whoami\` で確認）
          - [ ] \`allow_network=True\` + \`inject_vcs_token=True\` で \`gh issue view\` が動作すること

          Closes #56"
