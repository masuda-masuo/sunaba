name: Build sandbox variant images

# base → python / go を digest 固定でビルドして GHCR に push する。
# base を先にビルドして digest を確定し、子イメージの BASE_IMAGE にその digest を渡す
# （docs/design-multilang-support.md §6・§7）。
#
# 既存の build-sandbox-image.yml（Dockerfile.sandbox → sandbox:latest）はそのまま残す。
# server.py の _DEFAULT_IMAGE を sandbox:python へ切り替えるのは verify dispatch 実装後の別 PR。
#
# ビルド後、各バリアントイメージの HEALTHCHECK を実機（docker run）で確認する
# （docs/design-multilang-support.md §5-6／設計方針「壊れたツールを隠さない」）。
#
# 注意: 各イメージの HEALTHCHECK --interval=30s のため、最初のチェック完了まで
# 最大 35 秒かかる。poll は余裕を持って 90 秒（30 回 × 3s）待つ。

on:
  push:
    branches: [main]
    paths:
      - "docker/Dockerfile.base"
      - "docker/Dockerfile.python"
      - "docker/Dockerfile.go"
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define healthcheck helpers
        run: |
          cat <<'SCRIPT' > /tmp/healthcheck.sh
          wait_healthy() {
            local cid=$1 label=$2 max=${3:-30}
            for i in $(seq 1 $max); do
              s=$(docker inspect --format='{{.State.Health.Status}}' "$cid" 2>/dev/null || echo "starting")
              if [ "$s" = "healthy" ]; then
                echo "[$label] HEALTHCHECK: $s"
                return 0
              fi
              sleep 3
            done
            echo "[$label] HEALTHCHECK: timeout ($s)"
            return 1
          }
          SCRIPT

      # 1) base を先にビルドして digest を固定
      - name: Build and push base
        id: base
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.base
          push: true
          tags: ghcr.io/${{ github.repository }}/sandbox:base

      # 2) base の HEALTHCHECK を確認
      #    各イメージの HEALTHCHECK --interval=30s に対して max=30（90s）で待つ
      - name: Verify base HEALTHCHECK
        run: |
          source /tmp/healthcheck.sh
          IMG="ghcr.io/${{ github.repository }}/sandbox@${{ steps.base.outputs.digest }}"
          CID=$(docker run -d "$IMG" sleep 90)
          wait_healthy "$CID" "base" 30 || { docker kill "$CID" >/dev/null 2>&1; exit 1; }
          docker kill "$CID" >/dev/null 2>&1

      # 3) 壊れたツールで HEALTHCHECK が unhealthy になることを確認（base）
      #    設計方針「壊れたツールを隠さない」の実機検証。
      - name: Verify base HEALTHCHECK — broken tool → unhealthy
        run: |
          source /tmp/healthcheck.sh
          BASE_DIGEST="${{ steps.base.outputs.digest }}"
          BASE_REF="ghcr.io/${{ github.repository }}/sandbox@${BASE_DIGEST}"
          cat <<'DOCKERFILE' | docker build --build-arg BASE="${BASE_REF}" --tag "broken-base" -f- .
          ARG BASE
          FROM ${BASE}
          USER root
          RUN mv /usr/bin/rg /usr/bin/rg.bak
          USER sandbox
          HEALTHCHECK --interval=5s --timeout=3s --retries=2 \
            CMD rg --version && sg --version && node --version || exit 1
          DOCKERFILE
          CID=$(docker run -d "broken-base" sleep 30)
          for i in $(seq 1 7); do
            s=$(docker inspect --format='{{.State.Health.Status}}' "$CID" 2>/dev/null || echo "starting")
            if [ "$s" = "unhealthy" ]; then
              echo "[base-broken] HEALTHCHECK: $s (expected)"
              docker kill "$CID" >/dev/null 2>&1
              exit 0
            fi
            sleep 3
          done
          final=$(docker inspect --format='{{.State.Health.Status}}' "$CID" 2>/dev/null || echo "unknown")
          docker kill "$CID" >/dev/null 2>&1
          echo "[base-broken] HEALTHCHECK: $final (expected unhealthy)"
          [ "$final" = "unhealthy" ]

      # 4) 子イメージは base の digest を BASE_IMAGE に固定してビルド
      - name: Build and push python
        id: python
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.python
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository }}/sandbox@${{ steps.base.outputs.digest }}
          tags: ghcr.io/${{ github.repository }}/sandbox:python

      # 5) python の HEALTHCHECK を確認
      - name: Verify python HEALTHCHECK
        run: |
          source /tmp/healthcheck.sh
          IMG="ghcr.io/${{ github.repository }}/sandbox@${{ steps.python.outputs.digest }}"
          CID=$(docker run -d "$IMG" sleep 90)
          wait_healthy "$CID" "python" 30 || { docker kill "$CID" >/dev/null 2>&1; exit 1; }
          docker kill "$CID" >/dev/null 2>&1

      - name: Build and push go
        id: go
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.go
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository }}/sandbox@${{ steps.base.outputs.digest }}
          tags: ghcr.io/${{ github.repository }}/sandbox:go

      # 6) go の HEALTHCHECK を確認
      - name: Verify go HEALTHCHECK
        run: |
          source /tmp/healthcheck.sh
          IMG="ghcr.io/${{ github.repository }}/sandbox@${{ steps.go.outputs.digest }}"
          CID=$(docker run -d "$IMG" sleep 90)
          wait_healthy "$CID" "go" 30 || { docker kill "$CID" >/dev/null 2>&1; exit 1; }
          docker kill "$CID" >/dev/null 2>&1

      # 6.5) full（全部入り・既定イメージ, #584）
      #      python / go と同じ install スクリプトを叩くので、ツール定義は
      #      ドリフトしない。HEALTHCHECK が dispatch マトリクスの和を表明する。
      - name: Build and push full
        id: full
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.full
          push: true
          build-args: |
            BASE_IMAGE=ghcr.io/${{ github.repository }}/sandbox@${{ steps.base.outputs.digest }}
          tags: ghcr.io/${{ github.repository }}/sandbox:full

      # 6.6) full の HEALTHCHECK を確認
      #      ここが #584 の構造的な再発防止線: verify が dispatch しうるツールの
      #      焼き漏れは、ユーザーの初回 verify ではなくこの CI ステップで落ちる。
      - name: Verify full HEALTHCHECK
        run: |
          source /tmp/healthcheck.sh
          IMG="ghcr.io/${{ github.repository }}/sandbox@${{ steps.full.outputs.digest }}"
          CID=$(docker run -d "$IMG" sleep 90)
          wait_healthy "$CID" "full" 30 || { docker kill "$CID" >/dev/null 2>&1; exit 1; }
          docker kill "$CID" >/dev/null 2>&1

      # 7) digest 固定参照と HEALTHCHECK 結果を Job Summary に出す
      - name: Summary
        run: |
          {
            echo "## sandbox variant images"
            echo ""
            echo "| tag | digest | health | broken-tool |"
            echo "|-----|--------|--------|-------------|"
            echo "| base   | \`${{ steps.base.outputs.digest }}\` | ✅ verified | ✅ unhealthy detected |"
            echo "| python | \`${{ steps.python.outputs.digest }}\` | ✅ verified | — |"
            echo "| go     | \`${{ steps.go.outputs.digest }}\` | ✅ verified | — |"
            echo "| full   | \`${{ steps.full.outputs.digest }}\` | ✅ verified | — |"
            echo ""
            echo "image_pins.json の neutral / python / go pin を上の digest へ更新する PR を自動作成します（#313）。"
          } >> "$GITHUB_STEP_SUMMARY"

      # 8) 既定イメージの digest pin を image_pins.json に書き戻して PR を作成（#313）
      #    検出ベースの画像選択（image_selection.py）が参照する 3 つの pin を
      #    最新ビルドの digest に揃える。旧 build-sandbox-image.yml が
      #    _DEFAULT_IMAGE をモノリスへ巻き戻していた問題を置き換える。
      #    ブランチからの workflow_dispatch（新イメージの digest を採取する用途、
      #    #584 のブートストラップ）では pin PR を開かない。pin は main の
      #    ビルドだけが更新する。
      - name: Update default image pins in image_pins.json and open PR
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          BASE_DIGEST: ${{ steps.base.outputs.digest }}
          PYTHON_DIGEST: ${{ steps.python.outputs.digest }}
          GO_DIGEST: ${{ steps.go.outputs.digest }}
        run: |
          set -euo pipefail
          F=src/sunaba/image_pins.json

          # Rewrite the digest pins and verify the loader returns them (#331).
          # PYTHONPATH=src makes the package importable without installing; the
          # helper writes image_pins.json and re-reads it through the SAME loader
          # the server uses, so a key/path drift fails loudly here instead of
          # silently leaving a stale pin (the #214 failure mode).
          PYTHONPATH=src python3 scripts/update_image_pins.py \
            --repo "${REPO}" \
            --neutral "${BASE_DIGEST}" \
            --python "${PYTHON_DIGEST}" \
            --go "${GO_DIGEST}"

          # digest が変わっていなければ PR 不要
          if git diff --quiet; then
            echo "No digest change in image_pins.json, skipping PR."
            exit 0
          fi

          BRANCH="ci/update-variant-images-${RUN_ID}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add "$F"
          git commit -m "chore: update default variant image pins (#313)

          base:   ghcr.io/${REPO}/sandbox@${BASE_DIGEST}
          python: ghcr.io/${REPO}/sandbox@${PYTHON_DIGEST}
          go:     ghcr.io/${REPO}/sandbox@${GO_DIGEST}

          Automated update triggered by docker/Dockerfile.{base,python,go} build."
          git push origin "${BRANCH}"

          gh pr create \
            --base main \
            --head "${BRANCH}" \
            --title "chore(#313): 既定 variant イメージの digest pin を更新" \
            --body "## 自動生成 PR（#313: 検出ベース既定イメージの pin 更新）

          CI で \`docker/Dockerfile.{base,python,go}\` のビルドが完了したため、
          \`image_pins.json\` の \`neutral\` / \`python\` / \`go\` pin を
          新しい digest へ更新します。

          | tag | digest |
          |-----|--------|
          | base   | \`${BASE_DIGEST}\` |
          | python | \`${PYTHON_DIGEST}\` |
          | go     | \`${GO_DIGEST}\` |

          - Workflow run: ${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}"
